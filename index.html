<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karta Gracza</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="player-card">
    <header class="card-header">
      <h1>🎮 Karta Gracza</h1>
      <p>Nick: <span class="highlight">Filipok3101</span></p>
    </header>
    <section class="card-section bio">
      <h2>📖 Bio</h2>
      <p>Lvl: <strong>7</strong>/50</p>
      <p>Klasa: <strong>Drwal</strong></p>
      <p>Gildia: <strong>Pixelowi Wojownicy</strong></p>
    </section>
    <section class="card-section equipment">
      <h2>⚔️ Ekwipunek</h2>
      <ul>
        <li>Drewniana Siekiera +5</li>
        <li>Pochodnia</li>
        <li>Drewniany Łuk +3</li>
        <li>Złote Strzały</li>
      </ul>
    </section>
    <section class="card-section achievements">
      <h2>🏆 Osiągnięcia</h2>
      <ul>
        <li>🌲Pierwsze ścięte drzewo</li>
        <li>Pierwsza zwierzyna</li>
      </ul>
    </section>
    <footer clas="card-footer">
      <p>Ostatnia aktywność: <time datetime="2026-05-30">30 maja 2026</time></p>     
    </footer>

  </main>
</body>
</html>
